# Render Blueprint pre FVZ Monitoring AI
# https://render.com/docs/blueprint-spec
#
# Použitie:
#   1. Commit + push tento súbor do GitHub repa
#   2. Render Dashboard → New → Blueprint → vyber repo
#   3. Render automaticky vytvorí všetky cron jobs + web service
#   4. Pri vytvorení ťa Render vyzve doplniť env premenné (envVars bez `value`)
#
# Ak chceš pustiť len niektoré servisy (napr. najprv len Solinteg), zakomentuj
# ostatné cron-y a deployni len `fve-monitoring-orchestrator-solinteg`.

services:
  # =============================================================================
  # CRON: realtime ingest pre všetkých vendorov (každých 5 min)
  # =============================================================================
  - type: cron
    name: fve-monitoring-realtime
    runtime: python
    plan: starter        # $7/mes, dosť pre 400 staníc × 5 min
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m ingest.orchestrator --all-vendors --action realtime
    autoDeploy: true
    envVars:
      - fromGroup: fve-monitoring-shared

  # =============================================================================
  # CRON: alarms (každých 5 min, posunuté o 1 min aby sa nezhodili s realtime)
  # =============================================================================
  - type: cron
    name: fve-monitoring-alarms
    runtime: python
    plan: starter
    schedule: "1-59/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m ingest.orchestrator --all-vendors --action alarms
    envVars:
      - fromGroup: fve-monitoring-shared

  # =============================================================================
  # CRON: denný KPI rollup + cohort outlier detection (00:30 UTC)
  # =============================================================================
  - type: cron
    name: fve-monitoring-daily-kpi
    runtime: python
    plan: starter
    schedule: "30 0 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: |
      python -m ingest.orchestrator --all-vendors --action daily-summary && \
      python -m dispatch.kpi_engine --period daily && \
      python -m dispatch.anomaly_detector --mode cohort
    envVars:
      - fromGroup: fve-monitoring-shared

  # =============================================================================
  # CRON: zero-export breach detector (každých 15 min)
  # =============================================================================
  - type: cron
    name: fve-monitoring-zero-export
    runtime: python
    plan: starter
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m dispatch.zero_export
    envVars:
      - fromGroup: fve-monitoring-shared

  # =============================================================================
  # CRON: alarm engine — dedup + routing (každých 10 min)
  # =============================================================================
  - type: cron
    name: fve-monitoring-alarm-engine
    runtime: python
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m dispatch.alarm_engine
    envVars:
      - fromGroup: fve-monitoring-shared

  # =============================================================================
  # CRON: PVGIS baseline backfill (každý deň 03:00 UTC pre nové stanice)
  # =============================================================================
  - type: cron
    name: fve-monitoring-pvgis-backfill
    runtime: python
    plan: starter
    schedule: "0 3 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m ingest.pvgis_baseline --backfill-new
    envVars:
      - fromGroup: fve-monitoring-shared

  # =============================================================================
  # CRON: ML anomaly classifier (každé 2 hodiny, len pre stanice s 30+ dňami dát)
  # =============================================================================
  - type: cron
    name: fve-monitoring-anomaly-ml
    runtime: python
    plan: starter
    schedule: "0 */2 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m dispatch.anomaly_detector --mode ml
    envVars:
      - fromGroup: fve-monitoring-shared

# =============================================================================
# Zdieľaná skupina env premenných — vyplnia sa pri prvom deployi cez Render UI
# =============================================================================
envVarGroups:
  - name: fve-monitoring-shared
    envVars:
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false

      # Vendor toggles — najprv zapni len overené vendory
      # Phase 1 = len Huawei. Ostatných zapni keď ich API request dorazí.
      - key: VENDOR_HUAWEI_ENABLED
        value: "true"
      - key: VENDOR_SOLINTEG_ENABLED
        value: "false"
      - key: VENDOR_GOODWE_ENABLED
        value: "false"
      - key: VENDOR_FRONIUS_ENABLED
        value: "false"
      - key: VENDOR_SUNGROW_ENABLED
        value: "false"

      # Huawei
      - key: HUAWEI_USERNAME
        sync: false
      - key: HUAWEI_PASS
        sync: false
      - key: HUAWEI_API_BASE
        value: "https://intl.fusionsolar.huawei.com"

      # Solinteg
      - key: SOLINTEG_APP_KEY
        sync: false
      - key: SOLINTEG_APP_SECRET
        sync: false
      - key: SOLINTEG_USERNAME
        sync: false
      - key: SOLINTEG_PASS
        sync: false
      - key: SOLINTEG_API_BASE
        value: "https://api.solinteg-cloud.com"

      # GoodWe
      - key: GOODWE_USERNAME
        sync: false
      - key: GOODWE_PASS
        sync: false
      - key: GOODWE_API_BASE
        value: "https://www.semsportal.com"

      # Fronius
      - key: FRONIUS_CLIENT_ID
        sync: false
      - key: FRONIUS_CLIENT_SECRET
        sync: false
      - key: FRONIUS_ACCESS_KEY_ID
        sync: false
      - key: FRONIUS_ACCESS_KEY_VALUE
        sync: false
      - key: FRONIUS_API_BASE
        value: "https://api.solarweb.com"

      # Sungrow
      - key: SUNGROW_APP_KEY
        sync: false
      - key: SUNGROW_USERNAME
        sync: false
      - key: SUNGROW_PASS
        sync: false
      - key: SUNGROW_API_BASE
        value: "https://gateway.isolarcloud.eu"

      # Dispatch
      - key: DISPATCH_READ_ONLY
        value: "true"   # SAFETY: štart v read-only, žiadne send_command
      - key: ZERO_EXPORT_TOLERANCE_KWH
        value: "0.05"
      - key: ZERO_EXPORT_CONSECUTIVE_WINDOWS
        value: "2"

      # Notifikácie
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_DISPATCH_CHANNEL
        value: "#dispatch-alarms"
      - key: SENDGRID_API_KEY
        sync: false
      - key: NOTIFICATION_FROM_EMAIL
        value: "dispecing@energovision.sk"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_PHONE
        sync: false

      # LLM
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_MODEL
        value: "claude-sonnet-4-6"
