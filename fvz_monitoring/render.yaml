# FVZ Monitoring Render Blueprint
# Vytvor cez: Render dashboard → Blueprints → New Blueprint Instance
#   - Repository: bagolukas-source/energovision-cp-generator
#   - Branch: main
#   - Root Directory: fvz_monitoring
#   - Blueprint File: render.yaml

services:
  - type: cron
    name: fvz-monitoring-realtime
    runtime: python
    plan: starter
    region: frankfurt
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m ingest.orchestrator --all-vendors --action realtime
    envVars:
      - fromGroup: fvz-monitoring-shared

  - type: cron
    name: fvz-monitoring-alarms
    runtime: python
    plan: starter
    region: frankfurt
    schedule: "1-59/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m ingest.orchestrator --all-vendors --action alarms
    envVars:
      - fromGroup: fvz-monitoring-shared

  - type: cron
    name: fvz-monitoring-daily-kpi
    runtime: python
    plan: starter
    region: frankfurt
    schedule: "30 0 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: |
      python -m ingest.orchestrator --all-vendors --action daily-summary && \
      python -m dispatch.kpi_engine --period daily && \
      python -m dispatch.anomaly_detector --mode cohort
    envVars:
      - fromGroup: fvz-monitoring-shared

  - type: cron
    name: fvz-monitoring-zero-export
    runtime: python
    plan: starter
    region: frankfurt
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m dispatch.zero_export
    envVars:
      - fromGroup: fvz-monitoring-shared

  - type: cron
    name: fvz-monitoring-alarm-engine
    runtime: python
    plan: starter
    region: frankfurt
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m dispatch.alarm_engine
    envVars:
      - fromGroup: fvz-monitoring-shared

  - type: cron
    name: fvz-monitoring-anomaly-ml
    runtime: python
    plan: starter
    region: frankfurt
    schedule: "0 */2 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m dispatch.anomaly_detector --mode ml
    envVars:
      - fromGroup: fvz-monitoring-shared

