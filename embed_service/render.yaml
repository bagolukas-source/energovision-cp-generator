services:
  - type: web
    name: energovision-embeddings
    runtime: python
    region: frankfurt
    plan: starter            # CPU; model e5-large ~2GB → starter/standard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: EMBED_MODEL
        value: intfloat/multilingual-e5-large
      - key: PYTHON_VERSION
        value: "3.11"
