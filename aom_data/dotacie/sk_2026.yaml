# Aktualizácia: 2026-05-24. Pred použitím na klientske posudky overiť aktuálne výzvy.

zelena_podnikom:
  nazov: "Zelená podnikom"
  vyhlasovatel: "SIEA / MH SR"
  status: "active"          # active | upcoming | closed
  max_eur: 50000
  intensity_pct: 40         # základ 40 %; 45 % ak samospotreba > 80 % (SIEA)
  min_samospotreba_pct: 50  # SIEA: min 50 % samospotreba (45 % intenzita až pri >80 %)
  max_kwp: 250              # Zelená podnikom je do 250 kW; nad to → Modernizačný fond
  applicable_to:
    - "FVE"
    - "FVE+BESS"
  applicable_capex:
    - "panely"
    - "menice"
    - "konstrukcia"
    - "bess"
    - "instalacia"
  exclusions:
    - "pripojenie_VN"
  source_url: "https://www.siea.sk/zelena-podnikom"
  last_verified: "2026-05-24"

