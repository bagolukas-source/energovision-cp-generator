# Bilančné skupiny — výkupné modely pre prebytky FVE
bilancne_skupiny:
  Energie2:
    fix_klient:
      vykupna_eur_kwh: 0.060          # pevná výkupná cena
      threshold_eur_mwh: 20.0         # pod spot 20 €/MWh → výkup = 0
      negative_floor_eur_mwh: 0.0     # negatívne hodiny → 0
    spot_klient:
      vykupna_formula: "spot * 0.95 - 5"  # spot × 0.95 - 5 €/MWh marža
      negative_floor_eur_mwh: 0.0
  SlovakiaEnergy:
    fix_klient:
      vykupna_eur_kwh: 0.058
      threshold_eur_mwh: 25.0
      negative_floor_eur_mwh: 0.0
    spot_klient:
      vykupna_formula: "spot * 0.93 - 4"
      negative_floor_eur_mwh: 0.0
  Greenlogy:
    fix_klient:
      vykupna_eur_kwh: 0.062
      threshold_eur_mwh: 20.0
      negative_floor_eur_mwh: 0.0
    spot_klient:
      vykupna_formula: "spot * 0.96 - 6"
      negative_floor_eur_mwh: 0.0
