# FVZ MONITORING — PIVOT 2026-05-26: 4 cronky odstránené (realtime/alarms/zero-export/alarm-engine).
# /admin/monitoring teraz čerpá live z /webhook/fleet-status (read-only call do huawei_spot.py).
# Ponechané iba `fvz-monitoring-daily-kpi` (denný performance scoring) a `fvz-monitoring-anomaly-ml` (2-hod ML).
# SPOT reactor (huawei_spot.py + Vercel cron) je úplne nedotknutý.

services:
- type: web
  name: energovision-cp-generator
  runtime: python
  plan: standard
  region: frankfurt
  buildCommand: 'apt-get update && apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libreoffice-writer --no-install-recommends

    pip install -r requirements.txt

    '
  startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
  healthCheckPath: /health
  envVars:
  - key: NOTION_TOKEN
    sync: false
  - key: NOTION_DATABASE_ID
    value: ba7a1d6c-63a9-43da-b66d-2b1c7e8660da
  - key: WEBHOOK_SECRET
    generateValue: true
  - key: SUPABASE_URL
    value: https://uzwajrpebblafuhrtuwn.supabase.co
  - key: SUPABASE_SERVICE_ROLE_KEY
    sync: false
  - key: ANTHROPIC_API_KEY
    sync: false
- type: cron
  name: fvz-monitoring-daily-kpi
  runtime: python
  plan: starter
  region: frankfurt
  rootDir: fvz_monitoring
  schedule: 30 0 * * *
  buildCommand: pip install -r requirements.txt
  startCommand: 'python -m ingest.orchestrator --all-vendors --action daily-summary && \

    python -m dispatch.kpi_engine --period daily && \

    python -m dispatch.anomaly_detector --mode cohort

    '
  envVars:
  - fromGroup: fvz-monitoring-shared
- type: cron
  name: fvz-monitoring-anomaly-ml
  runtime: python
  plan: starter
  region: frankfurt
  rootDir: fvz_monitoring
  schedule: 0 */2 * * *
  buildCommand: pip install -r requirements.txt
  startCommand: python -m dispatch.anomaly_detector --mode ml
  envVars:
  - fromGroup: fvz-monitoring-shared
envVarGroups:
- name: fvz-monitoring-shared
  envVars:
  - key: SUPABASE_URL
    value: https://uzwajrpebblafuhrtuwn.supabase.co
  - key: SUPABASE_SERVICE_ROLE_KEY
    sync: false
  - key: SUPABASE_DB_URL
    sync: false
  - key: VENDOR_HUAWEI_ENABLED
    value: 'true'
  - key: VENDOR_SOLINTEG_ENABLED
    value: 'false'
  - key: VENDOR_GOODWE_ENABLED
    value: 'false'
  - key: VENDOR_FRONIUS_ENABLED
    value: 'false'
  - key: VENDOR_SUNGROW_ENABLED
    value: 'false'
  - key: HUAWEI_USERNAME
    sync: false
  - key: HUAWEI_PASS
    sync: false
  - key: HUAWEI_API_BASE
    value: https://eu5.fusionsolar.huawei.com
  - key: SOLINTEG_APP_KEY
    sync: false
  - key: SOLINTEG_APP_SECRET
    sync: false
  - key: SOLINTEG_USERNAME
    sync: false
  - key: SOLINTEG_PASS
    sync: false
  - key: SOLINTEG_API_BASE
    value: https://api.solinteg-cloud.com
  - key: GOODWE_USERNAME
    sync: false
  - key: GOODWE_PASS
    sync: false
  - key: GOODWE_API_BASE
    value: https://www.semsportal.com
  - key: FRONIUS_CLIENT_ID
    sync: false
  - key: FRONIUS_CLIENT_SECRET
    sync: false
  - key: FRONIUS_ACCESS_KEY_ID
    sync: false
  - key: FRONIUS_ACCESS_KEY_VALUE
    sync: false
  - key: FRONIUS_API_BASE
    value: https://api.solarweb.com
  - key: SUNGROW_APP_KEY
    sync: false
  - key: SUNGROW_USERNAME
    sync: false
  - key: SUNGROW_PASS
    sync: false
  - key: SUNGROW_API_BASE
    value: https://gateway.isolarcloud.eu
  - key: DISPATCH_READ_ONLY
    value: 'true'
  - key: ZERO_EXPORT_TOLERANCE_KWH
    value: '0.05'
  - key: ZERO_EXPORT_CONSECUTIVE_WINDOWS
    value: '2'
  - key: SLACK_BOT_TOKEN
    sync: false
  - key: SLACK_DISPATCH_CHANNEL
    value: '#dispatch-alarms'
  - key: SENDGRID_API_KEY
    sync: false
  - key: NOTIFICATION_FROM_EMAIL
    value: dispecing@energovision.sk
  - key: TWILIO_ACCOUNT_SID
    sync: false
  - key: TWILIO_AUTH_TOKEN
    sync: false
  - key: TWILIO_FROM_PHONE
    sync: false
  - key: ANTHROPIC_API_KEY
    sync: false
  - key: LLM_MODEL
    value: claude-sonnet-4-6
